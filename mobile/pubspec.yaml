name: warms_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # HTTP & Stockage
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0

  # Navigation & State
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1

  # Scanner & Caméra
  mobile_scanner: ^7.2.0
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1

  # Calendrier & Notifications
  table_calendar: ^3.2.0
  flutter_local_notifications: ^21.0.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # QR Code
  qr_flutter: ^4.1.0

  # Utilitaires
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1

  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animations & UI
  lottie: ^3.3.3
  flutter_native_splash: ^2.4.1

  # Voix
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Configuration flutter_native_splash (séparée de dependencies !)
flutter_native_splash:
  color: "#1E4DB7"
  image: assets/splashscreen/splash_native.png
  android_12:
    image: assets/splashscreen/splash_native.png
    color: "#1E4DB7"

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/splashscreen/   # ← ajoutez ce dossier

  