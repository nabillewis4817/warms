<!DOCTYPE html>
<html>
<head>

    This is a placeholder for base href that will be replaced by the value of

<body style="margin:0;background:linear-gradient(135deg,#1a2e6b 0%,#1e4db7 55%,#3b82f6 100%);">
  <div id="warms-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;">
    <div style="width:110px;height:110px;background:rgba(255,255,255,0.18);border-radius:28px;border:2px solid rgba(255,255,255,0.38);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 32px rgba(0,0,0,0.22);">

      var el = document.getElementById('warms-loader');

    });

  <script src="flutter.js" defer></script>
  <script src="flutter_bootstrap.js" defer></script>
