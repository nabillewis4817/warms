name: warms_mobile
description: Application mobile WARMS avec IA intelligente
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI et Material Design
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  
  # HTTP et API
  http: ^1.1.0
  dio: ^5.3.2
  
  # Gestion d'état
  provider: ^6.0.5
  flutter_bloc: ^8.1.3
  
  # Navigation
  go_router: ^12.1.3
  
  # Stockage local
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image et OCR
  image_picker: ^1.0.4
  permission_handler: ^11.0.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  firebase_messaging: ^14.7.6
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  
  # Animations
  lottie: ^2.7.0
  
  # Graphiques et visualisation
  fl_chart: ^0.64.0
  
  # Authentification
  flutter_secure_storage: ^9.0.0
  
  # Camera et documents
  camera: ^0.10.5+5
  file_picker: ^6.1.1
  
  # Localisation
  geolocator: ^10.1.0
  
  # WebSocket pour temps réel
  web_socket_channel: ^2.4.0
  
  # JSON annotation
  json_annotation: ^4.8.1
  
  # Logging
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Génération de code
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  
  # Tests
  mockito: ^5.4.2
  
  # Analyse de code
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/config/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive.png"

flutter_native_splash:
  color: "#1e4db7"
  image: "assets/icons/splash_icon.png"
  android_gravity: center
  ios_content_mode: center

# Configuration pour différentes plateformes
flutter_launcher_icons:
  android:
    adaptive_icon_background: "#1e4db7"
    adaptive_icon_foreground: "assets/icons/app_icon_adaptive.png"
  ios:
    bundle_id: "com.warms.mobile"
  web:
    generate: true
