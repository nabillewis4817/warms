<!-- ========================================
     COMPOSANT DOSSIER PATIENT
     ======================================== -->
<section class="section-dossier-patient">
  <header class="en-tete-dossier">
    <div class="titre-avec-icone">
      <img src="assets/folder.png" alt="Dossier patient" class="icone-dossier">
      <h2 class="titre-dossier">Dossier Patient</h2>
    </div>
  </header>
  
  <main class="contenu-dossier">
    <div class="carte-dossier">
      <div class="en-tete-carte">
        <img src="assets/folder.png" alt="Icône dossier" class="icone-dossier-carte">
        <h3>Gestion du Dossier Patient</h3>
      </div>
      
      <div class="contenu-carte">
        <p>Cette section permet de gérer les informations complètes du dossier patient.</p>
        
        <div class="actions-dossier">
          <button class="action-dossier">
            <i class="bi bi-person"></i>
            Informations personnelles
          </button>
          <button class="action-dossier">
            <i class="bi bi-file-medical"></i>
            Historique médical
          </button>
          <button class="action-dossier">
            <i class="bi bi-calendar-check"></i>
            Rendez-vous
          </button>
          <button class="action-dossier">
            <i class="bi bi-capsule"></i>
            Prescriptions
          </button>
        </div>
      </div>
    </div>
  </main>
</section>
