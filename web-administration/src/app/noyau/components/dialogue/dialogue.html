@if (visible && options) {
  <div class="dialogue-overlay" (click)="fermer()">
    <div class="dialogue-container {{ classeType }}" (click)="$event.stopPropagation()">
      <div class="dialogue-header">
        <div class="dialogue-icon">
          <i [class]="icone"></i>
        </div>
        <h3>{{ options.titre }}</h3>
      </div>
      
      <div class="dialogue-content">
        <p>{{ options.message }}</p>
      </div>
      
      <div class="dialogue-actions">
        @if (options.type === 'confirmation') {
          <button class="btn btn-secondary" (click)="annuler()">
            {{ options.boutonAnnuler || 'Annuler' }}
          </button>
          <button class="btn btn-primary" (click)="confirmer()">
            {{ options.boutonOk || 'Confirmer' }}
          </button>
        } @else {
          <button class="btn btn-primary" (click)="confirmer()">
            {{ options.boutonOk || 'OK' }}
          </button>
        }
      </div>
    </div>
  </div>
}
