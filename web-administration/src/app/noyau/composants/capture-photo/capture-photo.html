<div class="capture-photo" [class.capture-photo-grande]="taille === 'grande'">
  <div class="cp-cercle">
    @if (apercu) {
      <img [src]="apercu" alt="Photo" class="cp-image" />
    } @else {
      <div class="cp-placeholder">
        @if (initiales) {
          <span>{{ initiales }}</span>
        } @else {
          <i class="bi bi-person-fill"></i>
        }
      </div>
    }

    <div class="cp-overlay">
      <button type="button" class="cp-btn" (click)="declencherFichier()" title="Choisir une image">
        <i class="bi bi-upload"></i>
      </button>
      <button type="button" class="cp-btn" (click)="ouvrirCamera()" title="Prendre une photo">
        <i class="bi bi-camera-fill"></i>
      </button>
      @if (apercu) {
        <button type="button" class="cp-btn cp-btn-danger" (click)="supprimerPhoto()" title="Supprimer la photo">
          <i class="bi bi-trash3"></i>
        </button>
      }
    </div>
  </div>

  <input #inputFichier type="file" accept="image/*" hidden (change)="onFichierSelectionne($event)" />
  <p class="cp-hint">
    <i class="bi bi-info-circle"></i>
    Cliquez sur la photo pour l'ajouter ou la modifier
  </p>

  @if (cameraOuverte) {
    <div class="cp-camera-backdrop" (click)="fermerCamera()">
      <div class="cp-camera-modal" (click)="$event.stopPropagation()">
        <div class="cp-camera-header">
          <h4><i class="bi bi-camera-fill"></i> Prendre une photo</h4>
          <button type="button" class="cp-camera-close" (click)="fermerCamera()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        @if (cameraErreur) {
          <div class="cp-camera-erreur">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <p>{{ cameraErreur }}</p>
          </div>
        } @else {
          <div class="cp-video-wrapper">
            <video #video autoplay playsinline muted class="cp-video"></video>
          </div>
        }

        <div class="cp-camera-actions">
          <button type="button" class="cp-btn-annuler" (click)="fermerCamera()">
            <i class="bi bi-x-circle"></i> Annuler
          </button>
          @if (!cameraErreur) {
            <button type="button" class="cp-btn-capturer" (click)="capturer()">
              <i class="bi bi-camera2"></i> Capturer
            </button>
          }
        </div>
      </div>
    </div>
  }
</div>
