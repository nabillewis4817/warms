<section class="profil">
  <h2>{{ traductionService.t('profile') }}</h2>
  <p class="hint">Personnalise ton compte, tes notifications et l'interface.</p>

  @if (enChargement) {
    <p>Chargement...</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="enregistrer()">
      <div class="photo-block">
        @if (photoPreview) {
          <img class="avatar" [src]="photoPreview" alt="Photo profil" />
        } @else {
          <div class="avatar placeholder">Photo</div>
        }
        <div class="photo-actions">
          <label class="import-btn">
            Changer photo
            <input type="file" accept="image/*" (change)="onPhotoSelected($event)" />
          </label>
          @if (photoPreview) {
            <button type="button" (click)="supprimerPhoto()">Supprimer photo</button>
          }
        </div>
      </div>

      <div class="grid">
        <label>Prénom <input type="text" formControlName="first_name" /></label>
        <label>Nom <input type="text" formControlName="last_name" /></label>
        <label>Email <input type="email" formControlName="email" /></label>
        <label>Téléphone <input type="text" formControlName="telephone" /></label>
        <label>
          Langue
          <select formControlName="langue_interface">
            <option value="fr">Français</option>
            <option value="en">English</option>
          </select>
        </label>
        <label class="toggle">
          Mode sombre
          <input type="checkbox" formControlName="mode_sombre" />
        </label>
      </div>

      <h3>Notifications et rappels</h3>
      <div class="grid notif">
        <label class="toggle">Email <input type="checkbox" formControlName="notif_email" /></label>
        <label class="toggle">SMS <input type="checkbox" formControlName="notif_sms" /></label>
        <label class="toggle">Push <input type="checkbox" formControlName="notif_push" /></label>
        <label class="toggle">Rappels auto <input type="checkbox" formControlName="notif_rappels_auto" /></label>
      </div>

      <div class="actions">
        <button type="submit">{{ traductionService.t('save') }}</button>
        <button type="button" (click)="exporterPreferences()">Exporter</button>
        <label class="import-btn">
          Importer
          <input type="file" accept=".json,application/json" (change)="importerPreferences($event)" />
        </label>
        <button type="button" (click)="deconnexion()">Déconnexion</button>
      </div>
    </form>
  }

  @if (message) {
    <p class="message">{{ message }}</p>
  }
</section>
