<section class="auth-card">
  <h2>Mot de passe oublié</h2>
  <form [formGroup]="formEmail" (ngSubmit)="demanderToken()">
    <input placeholder="Email du compte" formControlName="email" />
    <button type="submit">Générer un token</button>
  </form>

  <form [formGroup]="formReset" (ngSubmit)="reset()">
    <input placeholder="Token de réinitialisation" formControlName="token" />
    <input placeholder="Nouveau mot de passe" type="password" formControlName="nouveau_mot_de_passe" />
    <button type="submit">Réinitialiser</button>
  </form>

  <a routerLink="/connexion">Retour connexion</a>
  @if (tokenRecu) { <p class="token">Token (dev): {{ tokenRecu }}</p> }
  @if (message) { <p class="msg">{{ message }}</p> }
</section>
