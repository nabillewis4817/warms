<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block titre %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#eff6ff; font-family:'Segoe UI', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eff6ff; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background-color:#ffffff; border-radius:18px; overflow:hidden; box-shadow:0 12px 32px rgba(30,77,183,0.12);">

          <!-- En-tête -->
          <tr>
            <td style="background:linear-gradient(135deg,#1e4db7,#3b82f6); padding:36px 40px; text-align:center;">
              <div style="font-size:26px; font-weight:700; color:#ffffff; letter-spacing:1px;">
                &#10084;&#65039; {{ site_name|upper }}
              </div>
              <div style="font-size:13px; color:#dbeafe; margin-top:6px;">
                Plateforme dentaire certifiée
              </div>
            </td>
          </tr>

          <!-- Contenu -->
          <tr>
            <td style="padding:40px;">
              {% block contenu %}{% endblock %}
            </td>
          </tr>

          <!-- Pied de page -->
          <tr>
            <td style="background-color:#f8fafc; padding:24px 40px; text-align:center; border-top:1px solid #e2e8f0;">
              <p style="margin:0; font-size:12px; color:#94a3b8;">
                Cet email a été envoyé automatiquement par {{ site_name }}, merci de ne pas y répondre.
              </p>
              <p style="margin:6px 0 0; font-size:12px; color:#94a3b8;">
                &copy; {{ annee }} {{ site_name|upper }} &mdash; Tous droits réservés
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
